<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalle - Booking Bot</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav>
    <a href="/">Inbox</a>
    <a href="/static/alerts.html">Alertas</a>
    <a href="/static/properties.html">Propiedades</a>
  </nav>

  <h1>Detalle de conversacion</h1>
  <div id="header"></div>
  <div id="content"><p class="loading">Cargando...</p></div>

  <script src="/static/js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const convId = params.get("id");

    async function load() {
      if (!convId) {
        document.getElementById("content").innerHTML = '<p class="error">Falta ?id= en la URL</p>';
        return;
      }

      try {
        const data = await API.get(`/api/conversations/${convId}/interactions`);
        renderHeader(data);
        renderMessages(data.messages);
      } catch (e) {
        document.getElementById("content").innerHTML = `<p class="error">${esc(e.message)}</p>`;
      }
    }

    function renderHeader(data) {
      document.getElementById("header").innerHTML = `
        <div class="conv-header">
          <div><span class="label">Conversation</span><br><span class="value">#${data.conversation_id}</span></div>
          <div><span class="label">Telegram Chat</span><br><span class="value">${data.telegram_chat_id}</span></div>
          <div><span class="label">Mensajes</span><br><span class="value">${data.total}</span></div>
          <div><a href="/">&larr; Volver</a></div>
        </div>`;
    }

    function renderMessages(msgs) {
      if (!msgs.length) {
        document.getElementById("content").innerHTML = "<p>Sin interacciones.</p>";
        return;
      }

      let html = '<div class="message-list">';
      for (const m of msgs) {
        const badges = [];
        if (m.urgent) badges.push('<span class="badge badge-red">urgente</span>');
        if (m.escalate) badges.push('<span class="badge badge-orange">escalado</span>');

        const reply = m.reply_text || m.ack_text || "";

        html += `<div class="message-card">
          <div class="user-msg">${esc(m.user_message)}</div>
          ${reply ? `<div class="bot-reply">${esc(reply)}</div>` : ""}
          <div class="meta">
            <span class="badge ${statusClass(m.action === 'reply_guest' ? 'bot_resolved' : 'host_pending')}">${m.action}</span>
            <span class="badge badge-gray">${m.category}</span>
            ${badges.join(" ")}
            &middot; ${fmtDate(m.created_at)}
          </div>
        </div>`;

        // Render inline alerts attached to this interaction
        if (m.alerts && m.alerts.length) {
          for (const a of m.alerts) {
            const resolved = a.resolved;
            const statusBadge = resolved
              ? '<span class="badge badge-green">resuelta</span>'
              : '<span class="badge badge-red">pendiente</span>';
            const resolveBtn = resolved
              ? ""
              : `<button class="btn-success" onclick="resolveAlert(${a.id}, this)">Resolver</button>`;

            html += `<div class="alert-inline ${resolved ? 'alert-resolved' : ''}">
              <div class="alert-inline-header">
                <span class="alert-inline-icon">&#9888;</span>
                <span class="alert-inline-title">Alerta</span>
                ${statusBadge}
                ${a.urgent ? '<span class="badge badge-red">urgente</span>' : ""}
                <span class="alert-inline-time">${fmtDate(a.created_at)}</span>
              </div>
              <div class="alert-inline-field">
                <span class="alert-inline-label">Motivo</span>
                <span>${esc(a.reason)}</span>
              </div>
              ${a.translated_text ? `<div class="alert-inline-field">
                <span class="alert-inline-label">Traduccion</span>
                <span>${esc(a.translated_text)}</span>
              </div>` : ""}
              ${a.draft_text ? `<div class="alert-inline-field">
                <span class="alert-inline-label">Borrador sugerido</span>
                <div class="alert-inline-draft">${esc(a.draft_text)}</div>
              </div>` : ""}
              ${resolveBtn ? `<div class="alert-inline-actions">${resolveBtn}</div>` : ""}
            </div>`;
          }
        }
      }
      html += "</div>";
      document.getElementById("content").innerHTML = html;
    }

    async function resolveAlert(alertId, btn) {
      btn.disabled = true;
      btn.textContent = "Resolviendo...";
      try {
        await API.patch(`/api/alerts/${alertId}/resolve`);
        load(); // Reload to reflect updated state
      } catch (e) {
        alert("Error: " + e.message);
        btn.disabled = false;
        btn.textContent = "Resolver";
      }
    }

    load();
  </script>
</body>
</html>
