<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alertas - Booking Bot</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav>
    <a href="/">Conversaciones</a>
    <a href="/static/alerts.html" class="active">Alertas</a>
  </nav>

  <h1>Alertas</h1>

  <div class="filters">
    <button onclick="setFilter(null)" id="f-all" class="active">Todas</button>
    <button onclick="setFilter('pending')" id="f-pending">Pendientes</button>
    <button onclick="setFilter('urgent')" id="f-urgent">Urgentes</button>
    <button onclick="setFilter('resolved')" id="f-resolved">Resueltas</button>
  </div>
  <input type="text" id="search" class="search-input"
         placeholder="Buscar por chat ID, propiedad o motivo..."
         oninput="applySearch()">

  <div id="content"><p class="loading">Cargando...</p></div>

  <script src="/static/js/api.js"></script>
  <script>
    let currentFilter = null;
    let allAlerts = [];

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
      const id = f ? `f-${f}` : "f-all";
      document.getElementById(id).classList.add("active");
      load();
    }

    async function load() {
      try {
        // Filtro pending/resolved via backend; urgent via client-side
        const backendFilter = (currentFilter === "pending" || currentFilter === "resolved")
          ? currentFilter : null;
        const qs = backendFilter ? `?status=${backendFilter}` : "";
        const data = await API.get(`/api/alerts${qs}`);
        allAlerts = data.alerts;

        // Filtro urgent client-side
        if (currentFilter === "urgent") {
          allAlerts = allAlerts.filter(a => a.urgent);
        }

        applySearch();
      } catch (e) {
        document.getElementById("content").innerHTML = `<p class="error">${esc(e.message)}</p>`;
      }
    }

    function applySearch() {
      const q = (document.getElementById("search").value || "").trim().toLowerCase();
      let filtered = allAlerts;
      if (q) {
        filtered = filtered.filter(a =>
          String(a.telegram_chat_id).includes(q) ||
          (a.property_id || "").toLowerCase().includes(q) ||
          (a.reason || "").toLowerCase().includes(q)
        );
      }
      if (!filtered.length) {
        document.getElementById("content").innerHTML = "<p>No hay alertas.</p>";
        return;
      }
      render(filtered);
    }

    function render(alerts) {
      let html = `<table>
        <thead><tr>
          <th>Propiedad</th>
          <th>Chat ID</th>
          <th>Motivo</th>
          <th>Urgente</th>
          <th>Traduccion</th>
          <th>Borrador</th>
          <th>Estado</th>
          <th>Fecha</th>
          <th>Accion</th>
        </tr></thead><tbody>`;

      for (const a of alerts) {
        const urgBadge = a.urgent
          ? '<span class="badge badge-red">SI</span>'
          : '<span class="badge badge-gray">no</span>';

        const statusBadge = a.resolved
          ? '<span class="badge badge-green">resuelta</span>'
          : '<span class="badge badge-orange">pendiente</span>';

        const action = a.resolved
          ? '<button disabled>Resuelta</button>'
          : `<button class="btn-success" onclick="resolveAlert(${a.id})">Resolver</button>`;

        const prop = esc(fmtProperty(a.property_id));

        html += `<tr>
          <td>${prop}</td>
          <td><a href="/static/conversation.html?id=${a.conversation_id}">${a.telegram_chat_id}</a></td>
          <td>${esc(a.reason || "-")}</td>
          <td>${urgBadge}</td>
          <td>${esc(truncate(a.translated_text, 60))}</td>
          <td>${esc(truncate(a.draft_text, 60))}</td>
          <td>${statusBadge}</td>
          <td>${timeAgo(a.created_at)}</td>
          <td>${action}</td>
        </tr>`;
      }

      html += "</tbody></table>";
      document.getElementById("content").innerHTML = '<div class="table-wrap">' + html + '</div>';
    }

    async function resolveAlert(id) {
      try {
        await API.patch(`/api/alerts/${id}/resolve`);
        load();
      } catch (e) {
        alert("Error: " + e.message);
      }
    }

    load();
  </script>
</body>
</html>
