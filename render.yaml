# Render Blueprint — API + panel admin del Booking Bot.
# Solo despliega la API (FastAPI + panel HTML). El bot de Telegram corre local.
#
# Uso: Render detecta este archivo automaticamente al conectar el repo.
# Tambien se puede importar manualmente desde https://render.com/blueprints

services:
  - type: web
    name: booking-bot-api
    runtime: python
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
