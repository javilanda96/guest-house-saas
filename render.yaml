# Render Blueprint — Booking Bot (API + panel + bot Telegram).
#
# Un unico servicio web que ejecuta:
#   - bot.py en background (polling Telegram)
#   - uvicorn en foreground (API + panel admin)
# Ambos comparten la misma base de datos PostgreSQL (persistente).
#
# Uso: Render detecta este archivo automaticamente al conectar el repo.
# Tambien se puede importar manualmente desde https://render.com/blueprints

databases:
  - name: booking-bot-db
    plan: free
    databaseName: booking_bot
    user: booking_bot

services:
  - type: web
    name: booking-bot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: booking-bot-db
          property: connectionString
